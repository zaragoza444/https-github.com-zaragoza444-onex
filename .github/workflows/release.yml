name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build binaries
        run: |
          mkdir -p dist
          for pair in "linux amd64" "linux arm64" "windows amd64"; do
            set -- $pair
            os=$1 arch=$2
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -ldflags="-s -w" -o "dist/shivad-${os}-${arch}${ext}" ./cmd/shivad
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -ldflags="-s -w" -o "dist/shiva-${os}-${arch}${ext}" ./cmd/shiva
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -ldflags="-s -w" -o "dist/shiva-bridge-${os}-${arch}${ext}" ./cmd/shiva-bridge
          done
          cd dist && sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
