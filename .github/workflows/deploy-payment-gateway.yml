name: Deploy payment gateway (production VPS)

on:
  workflow_dispatch:
    inputs:
      host:
        description: VPS IP or hostname
        required: true
        default: "51.75.64.28"
      branch:
        description: Git branch to deploy
        required: true
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          ONEX_STRIPE_SECRET_KEY: ${{ secrets.ONEX_STRIPE_SECRET_KEY }}
          ONEX_STRIPE_PUBLISHABLE_KEY: ${{ secrets.ONEX_STRIPE_PUBLISHABLE_KEY }}
          ONEX_STRIPE_WEBHOOK_SECRET: ${{ secrets.ONEX_STRIPE_WEBHOOK_SECRET }}
        with:
          host: ${{ inputs.host }}
          username: ubuntu
          password: ${{ secrets.SSH_PASS }}
          envs: ONEX_STRIPE_SECRET_KEY,ONEX_STRIPE_PUBLISHABLE_KEY,ONEX_STRIPE_WEBHOOK_SECRET
          script_stop: true
          script: |
            set -euo pipefail
            REPO="$HOME/onex"
            if [ ! -d "$REPO/.git" ]; then
              git clone https://github.com/zaragoza444/https-github.com-zaragoza444-onex.git "$REPO"
            fi
            cd "$REPO"
            git fetch origin ${{ inputs.branch }}
            git checkout ${{ inputs.branch }}
            git reset --hard "origin/${{ inputs.branch }}"
            export ONEX_STRIPE_SECRET_KEY="${ONEX_STRIPE_SECRET_KEY:-}"
            export ONEX_STRIPE_PUBLISHABLE_KEY="${ONEX_STRIPE_PUBLISHABLE_KEY:-}"
            export ONEX_STRIPE_WEBHOOK_SECRET="${ONEX_STRIPE_WEBHOOK_SECRET:-}"
            bash scripts/apply-production-env.sh
            curl -sf http://127.0.0.1:9338/bridge/payments/status
            curl -sf -o /dev/null -w "payments portal: %{http_code}\n" http://127.0.0.1:9338/payments/

      - name: Verify public bridge
        run: |
          sleep 5
          curl -sf --max-time 20 "http://${{ inputs.host }}:9338/bridge/payments/status" || echo "WARN: public bridge check failed — open port 9338 on firewall"
