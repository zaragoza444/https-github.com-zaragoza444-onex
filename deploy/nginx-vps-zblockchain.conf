# Nginx snippet for VPS — proxy payment gateway + bridge via port 80/443
# Install on VPS when onex-bridge runs on 127.0.0.1:9338
#
#   sudo cp deploy/nginx-vps-zblockchain.conf /etc/nginx/sites-available/zblockchain
#   sudo ln -sf /etc/nginx/sites-available/zblockchain /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name zblockchainsystem.com www.zblockchainsystem.com 51.75.64.28;

    # Payment gateway portal (OneX bridge)
    location /payments/ {
        proxy_pass http://127.0.0.1:9338/payments/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /bridge/ {
        proxy_pass http://127.0.0.1:9338/bridge/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /wallet/ {
        proxy_pass http://127.0.0.1:9338/wallet/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://127.0.0.1:9338/health;
    }

    # Existing Nova Bank SPA — keep as fallback for /
    location / {
        root /var/www/nova-bank;
        try_files $uri $uri/ /index.html;
    }
}
