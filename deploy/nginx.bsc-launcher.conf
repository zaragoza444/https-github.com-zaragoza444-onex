events { worker_connections 2048; }

http {
  upstream bsc_launcher {
    server bsc-launcher:9340;
  }

  limit_req_zone $binary_remote_addr zone=bsc_api:10m rate=20r/s;

  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    location /health {
      proxy_pass http://bsc_launcher/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name _;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 1m;

    location /health {
      proxy_pass http://bsc_launcher/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /ready {
      proxy_pass http://bsc_launcher/ready;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
      limit_req zone=bsc_api burst=40 nodelay;
      proxy_pass http://bsc_launcher/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 120s;
    }

    location / {
      proxy_pass http://bsc_launcher/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}
