events { worker_connections 2048; }

http {
  upstream onex_node {
    server onexd:8545;
  }

  upstream onex_bridge {
    server onex-bridge:9338;
  }

  # Production apex hosts (both return HTTP 200 from the bridge):
  #   zblockchainsystem.com + blockchainsystem.com
  # Other legacy hosts redirect to zblockchainsystem.com.

  # HTTP — ACME + apex production
  server {
    listen 80;
    server_name zblockchainsystem.com www.zblockchainsystem.com blockchainsystem.com www.blockchainsystem.com _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    location /health {
      proxy_pass http://onex_bridge/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 80;
    server_name novatrustee.digital onexproduction.com www.onexproduction.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    location / {
      return 301 https://zblockchainsystem.com$request_uri;
    }
  }

  # HTTPS — legacy → zblockchain only
  server {
    listen 443 ssl;
    server_name novatrustee.digital onexproduction.com www.onexproduction.com;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
      return 301 https://zblockchainsystem.com$request_uri;
    }
  }

  # HTTPS — full production (both apex domains, HTTP 200)
  server {
    listen 443 ssl;
    server_name zblockchainsystem.com www.zblockchainsystem.com blockchainsystem.com www.blockchainsystem.com;
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location /health {
      proxy_pass http://onex_bridge/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /wallet/ {
      proxy_pass http://onex_bridge/wallet/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /payments/ {
      proxy_pass http://onex_bridge/payments/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /bridge/ {
      proxy_pass http://onex_bridge/bridge/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /rpc {
      proxy_pass http://onex_bridge;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /explorer/ {
      proxy_pass http://onex_node/explorer/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
      proxy_pass http://onex_node;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
    }

    location / {
      return 302 /payments/;
    }
  }
}
