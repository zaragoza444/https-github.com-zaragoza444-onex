# Nginx — Z Bank / Z Blockchain System
# Canonical domain: zblockchainsystem.com (all other product domains redirect here)
# Bridge must listen on 127.0.0.1:9338 (or set via fix-bridge / fix-all-system).
#
#   sudo cp deploy/nginx-vps-zblockchain.conf /etc/nginx/sites-available/zblockchain-onex
#   sudo ln -sf /etc/nginx/sites-available/zblockchain-onex /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx

# Legacy product domains → canonical
server {
    listen 80;
    listen [::]:80;
    server_name blockchainsystem.com www.blockchainsystem.com onexproduction.com www.onexproduction.com novatrustee.digital;

    location / {
        return 301 http://zblockchainsystem.com$request_uri;
    }
}

# Canonical host
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name zblockchainsystem.com www.zblockchainsystem.com 51.75.64.28 _;

    # Z Payments portal
    location /payments/ {
        proxy_pass http://127.0.0.1:9338/payments/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Bridge API (bank, officer, ledger, payments)
    location /bridge/ {
        proxy_pass http://127.0.0.1:9338/bridge/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /wallet/ {
        proxy_pass http://127.0.0.1:9338/wallet/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health {
        proxy_pass http://127.0.0.1:9338/health;
    }

    # Brand assets from payment portal
    location /payments/assets/ {
        proxy_pass http://127.0.0.1:9338/payments/assets/;
    }

    # Default → Z Bank payments (not Nova SPA)
    location = / {
        return 302 /payments/;
    }

    location / {
        return 302 /payments/;
    }
}
