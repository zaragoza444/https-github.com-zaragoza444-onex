# Nginx — Z Bank full production (HTTP 200)
# Serves BOTH production hostnames with the live bridge (not parking / not SPA):
#   - zblockchainsystem.com
#   - blockchainsystem.com
#
# Bridge must listen on 127.0.0.1:9338 (or set via fix-all-system).
#
#   sudo cp deploy/nginx-vps-zblockchain.conf /etc/nginx/sites-available/zblockchain-onex
#   sudo ln -sf /etc/nginx/sites-available/zblockchain-onex /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS REQUIRED for blockchainsystem.com:
#   A @   → same IPv4 as zblockchainsystem.com (your VPS)
#   A www → same IPv4 as zblockchainsystem.com
#   Remove parking A records 76.223.54.146 / 13.248.169.48
#   See deploy/dns-records-blockchainsystem.com.md

# Full production — both apex domains (HTTP 200 → bridge)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name zblockchainsystem.com www.zblockchainsystem.com blockchainsystem.com www.blockchainsystem.com;

    # Z Payments portal
    location /payments/ {
        proxy_pass http://127.0.0.1:9338/payments/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Bridge API (bank, officer, ledger, payments) — must be JSON, never SPA
    location /bridge/ {
        proxy_pass http://127.0.0.1:9338/bridge/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /wallet/ {
        proxy_pass http://127.0.0.1:9338/wallet/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://127.0.0.1:9338/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /payments/assets/ {
        proxy_pass http://127.0.0.1:9338/payments/assets/;
    }

    # Default → Z Bank payments (not Nova SPA / not parking lander)
    location = / {
        return 302 /payments/;
    }

    location / {
        return 302 /payments/;
    }
}

# Other legacy product hosts still redirect to zblockchainsystem.com
server {
    listen 80;
    listen [::]:80;
    server_name onexproduction.com www.onexproduction.com novatrustee.digital;

    location / {
        return 301 http://zblockchainsystem.com$request_uri;
    }
}
